<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLICK&City - Category</title>
  <link rel="stylesheet" href="./css/category.css" />
</head>

<body>
  <main class="category-page">
    <section class="category-hero">
      <div class="category-hero-overlay"></div>
      <div class="category-hero-content">
        <div class="category-tag">Category</div>
        <h1 id="categoryTitle" class="category-title">Loading...</h1>
        <p id="categorySubtitle" class="category-subtitle"></p>
      </div>
    </section>

    <section id="categoryErrorBox" class="error-box hidden">
      <p id="categoryErrorText"></p>
    </section>

    <section class="category-content">
      <div id="placesGrid" class="places-grid"></div>
    </section>
  </main>

  <script src="./js/category.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLICK&City</title>

  <link rel="stylesheet" href="./css/city.css" />
</head>

<body>
  <main class="city-page">

    <!-- HERO -->
    <section class="hero">
      <div id="carousel" class="carousel"></div>
      <div class="hero-overlay"></div>

      <div id="heroContent" class="hero-content">
        <div class="city-tag">Loading...</div>
        <h1 class="city-name">Loading city...</h1>
      </div>

      <div id="carouselDots" class="carousel-dots"></div>
      <div id="photoCredit" class="photo-credit"></div>
    </section>

    <!-- ERROR -->
    <section id="errorBox" class="error-box hidden">
      <p id="errorText"></p>
    </section>

    <!-- CARDS -->
    <section class="cards-section">
      <div id="cardsGrid" class="cards-grid"></div>
    </section>

  </main>

  <script src="./js/city.js"></script>
</body>
</html>

version: "3.9"

services:
  backend:
    build: ./backend
    container_name: clickcity_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3000
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: clickcity_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html
      